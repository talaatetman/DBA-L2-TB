<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار ذكي</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        :root { --primary-color: #5145BA; --success-color: #28a745; --error-color: #dc3545; --bg-color: #f4f4f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--primary-color); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .container { background: white; width: 100%; max-width: 570px; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); display: none; }
        .container.active { display: block; }
        h2 { color: var(--primary-color); margin-bottom: 20px; text-align: center; }
        .setting-group { margin-bottom: 20px; }
        .group-label { display: block; margin-bottom: 10px; font-weight: bold; font-size: 0.95rem; }
        .grid-options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .chip-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .chip { padding: 10px; border: 2px solid #ddd; background: white; cursor: pointer; border-radius: 8px; transition: 0.3s; text-align: center; font-weight: 500;}
        .chip.active { border-color: var(--primary-color); background: #EEF2FF; color: var(--primary-color); font-weight: 900; }
        input { width: 100%; padding: 12px; border: 2px solid #EDF2F7; border-radius: 12px; font-size: 1rem; margin-top: 5px; outline: none; }
        .max-hint { display: block; font-size: 0.8rem; color: #718096; margin-top: 5px; }
        .start-btn { width: 100%; padding: 15px; background: var(--primary-color); color: white; border: none; border-radius: 15px; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-top: 20px; }
        .question-block { margin-bottom: 25px; }
        .question-text { font-size: 1.2rem; margin-bottom: 20px; color: #444; font-weight: bold; line-height: 1.4; }
        .option-item { padding: 14px; border: 2px solid #EDF2F7; margin-bottom: 10px; border-radius: 12px; cursor: pointer; }
        .option-item.correct { background: #C6F6D5; border-color: #48BB78; color: #22543D; }
        .option-item.incorrect { background: #FED7D7; border-color: #F56565; color: #742A2A; }
        .option-item.selected-temp { border-color: var(--primary-color); background: #EBF4FF; }
        .locked { pointer-events: none; }
    </style>
</head>
<body>
    <div id="setup-screen" class="container active">
        <h2>إعداد الاختبار</h2>
        <div class="setting-group">
            <span class="group-label">اختر القسم:</span>
            <div class="grid-options" id="category-selector">
                <button class="chip active" data-value="all">المنهج كامل</button>
                <button class="chip" data-value="dr.m">اسئلة د مى جاد</button>
                <button class="chip" data-value="dr.r">اسئلة د رانيا حمدى</button>

            </div>
        </div>
        <div class="setting-group">
            <span class="group-label">نظام الأسئلة:</span>
            <div class="chip-grid" id="order-selector">
                <button class="chip active" data-value="fixed">ثابت (كل اسئلة القسم المختار)</button>
                <button class="chip" data-value="random">ترتيب عشوائى (ادخل عدد الاسئلة)</button>
            </div>
        </div>
        <div id="num-section" class="setting-group" style="display: none;">
            <span class="group-label">العدد:</span>
            <input type="number" id="num-input">
            <span class="max-hint" id="max-label"></span>
        </div>
        <div class="setting-group">
            <span class="group-label">النمط:</span>
            <div class="chip-grid" id="mode-combined">
                <button class="chip active" data-value="exam_all">اختبار (كل الاسئلة فى ورقة واحدة)</button>
                <button class="chip" data-value="study_one">مذاكرة (عرض سؤال بسؤال)</button>
            </div>
        </div>
        <button class="start-btn" onclick="initQuiz()">ابدأ المراجعة</button>
    </div>

    <div id="quiz-screen" class="container">
        <div id="quiz-content"></div>
        <button id="submit-btn" class="start-btn" style="display:none" onclick="handleFullSubmit()">إنهاء</button>
        <button id="next-btn" class="start-btn" style="display:none" onclick="nextQuestion()">التالي</button>
        <p id="q-counter" style="text-align:center; margin-top:10px;"></p>
    </div>

    <div id="result-screen" class="container">
        <h2 id="res-title">النتيجة</h2>
        <p id="res-msg" style="text-align:center; font-size:1.5rem;"></p>
        <div id="mistakes-report"></div>
        <button class="start-btn" onclick="location.reload()">العودة</button>
    </div>

    <script>
        const db = [{"cat":"dr.m","q":"تبدأ خطوات التنفيذ للتحول للمنظمة الرقمية بإجراء دراسة جدوى لتقييم الوضع الحالي واحتياجات المنظمة بدقة.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.m","q":"يعد التحول للإدارة الإلكترونية رفاهية وليست ضرورة تفرضها التغيرات التكنولوجية وزيادة حدة المنافسة العالمية.","opts":["صح","خطأ"],"ans":1},{"cat":"dr.m","q":"يؤدي تطبيق الإدارة الإلكترونية إلى خفض تكاليف التخزين والورق والجهد الضائع في التعاملات الإدارية التقليدية للمنظمة.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.m","q":"من الأسباب التي دعت الى التحول للإدارة الإلكترونية الإجراءات والعمليات المعقدة وأثرها على زيادة تكلفة الاعمال.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.m","q":"يشعر الموظفون دائماً بالاطمئنان تجاه التقنيات الحديثة ولا يتخوفون من فقدان وظائفهم نتيجة تطبيق الإدارة الإلكترونية.","opts":["صح","خطأ"],"ans":1},{"cat":"dr.m","q":"يتطلب نجاح التحول الرقمي وضع خطة واضحة وتوزيع الأدوار والمتابعة المستمرة لضمان تنفيذ المسؤوليات المحددة.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.m","q":"الإدارة الإلكترونية تساهم في خفض الجهد الضائع في التعاملات التقليدية مما يؤدي بالضرورة لخفض جودة الأداء.","opts":["صح","خطأ"],"ans":1},{"cat":"dr.m","q":"مرت الإدارة الإلكترونية بعدة مراحل في تطورها بداية من مرحلة الانترنت وصولا الى مرحلة الحاسب الألى.","opts":["صح","خطأ"],"ans":1},{"cat":"dr.m","q":"الإدارة الإلكترونية لا تهدف الى توظيف تكنولوجيا المعلومات والاتصالات في دعم الثقافة التنظيمية لدى العاملين.","opts":["صح","خطأ"],"ans":1},{"cat":"dr.m","q":"تهدف الإدارة الإلكترونية إلى تحسين مخرجات العمل وزيادة كفاءة الأداء التنظيمي من خلال استخدام تكنولوجيا المعلومات.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.m","q":"قد ترفض الإدارة العليا أحياناً التغيير نحو الإدارة الإلكترونية بسبب عدم القناعة بأهميته أو نقص الكوادر البشرية المتخصصة.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.m","q":"التكامل المعلوماتي بين الإدارات المختلفة يسهل عملية الوصول للمعلومات ويقضي على الجزر المنعزلة داخل المنظمة.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.m","q":"تقتصر خطوة تحديد المصادر في عملية التحول الرقمي على توفير الموارد المالية فقط دون الاهتمام بالموارد التقنية.","opts":["صح","خطأ"],"ans":1},{"cat":"dr.m","q":"تتيح الإدارة الإلكترونية إمكانية تقديم الخدمة في أي وقت ومن أي مكان متجاوزة بذلك حدود الزمان والمكان التقليدية.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.m","q":"تهدف مرحلة تبادل المنفعة والذكاء الاصطناعي إلى الحصول على ميزة تنافسية واستجابة أقل لمتطلبات العمل المتغيرة.","opts":["صح","خطأ"],"ans":1},{"cat":"dr.m","q":"يعتبر التسارع التكنولوجي الكبير والتوجه العالمي نحو العولمة من أهم مبررات التحول إلى نظم الإدارة الإلكترونية الحديثة.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.m","q":"تساهم الإدارة الإلكترونية في إبطاء تنفيذ المعاملات الإدارية بسبب تعقيد الوسائط الإلكترونية مقارنة بالعمل اليدوي.","opts":["صح","خطأ"],"ans":1},{"cat":"dr.m","q":"يساعد توفير البيانات الفورية والدقيقة من خلال النظم الإلكترونية صناع القرار على رفع جودة مخرجات العمل وكفاءة الأداء.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.m","q":"تمثل مخاطر الاختراق الأمني وضياع المعلومات أحد المعوقات التكنولوجية التي تواجه عملية التحول الرقمي في المنظمات.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.m","q":"تستخدم الإدارة الإلكترونية للموارد البشرية التقنيات المعتمدة على الويب لتحقيق تكامل البيانات بين الإدارات المختلفة.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.m","q":"من المعوقات الإدارية التي تحد من تطبيق الإدارة الإلكترونية هو عدم تفهم الإدارة العليا لأهمية تطبيق الإدارة الإلكترونية.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.m","q":"تعرف الازمة بانها حدث حرج او نقطة قرار إذا لم تعالج بأسلوب ملائم وفى وقت مناسب ربما تحدث كارثة.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.m","q":"يتطلب تطبيق الإدارة الإلكترونية للأزمات توافر كفاءات بشرية قادرة على التعامل باحترافية مع التقنيات الحديثة.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.m","q":"تتمثل الازمات الطبيعية في تلف الأجهزة والمعدات وحوادث العربات ومركبات الشركات.","opts":["صح","خطأ"],"ans":1},{"cat":"dr.m","q":"يساعد وضوح رؤية المنظمة وأهدافها في تقليل احتمالية نشوب الأزمات التنظيمية الناتجة عن التخبط الإداري.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.m","q":"لا يعد تأخر ت عبر توفير بيانات دقيقة تتحول لمعلومات لاتخاذ القرار.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.m","q":"يعتمد التخطيط الإلكتروني على استخدام التخطيط الاستراتيجي لتحقيق الأهداف الاستراتيجية.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.m","q":"ضمان أمن المعلومات والاتصالات عبر الشبكات يعد من المتطلبات الأمنية الضرورية لنجاح نظام إدارة الأزمات.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.m","q":"تجاهل الأخطاء وعدم المراجعة الدورية للأداء يقلل من فرص حدوث الأزمات التنظيمية داخل المؤسسة.","opts":["صح","خطأ"],"ans":1},{"cat":"dr.m","q":"يقتصر مفهوم التسويق على عملية البيع والشراء فقط دون الحاجة لتعريف المستهلك بطبيعة المنتج وفوائده.","opts":["صح","خطأ"],"ans":1},{"cat":"dr.m","q":"يوفر التسويق الإلكتروني للمستهلك ميزة مقارنة الأسعار بسهولة وسرعة دون الحاجة للتنقل والتعرض للزحام.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.m","q":"يتكون المزيج التسويقي من أربعة عناصر أساسية.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.m","q":"تتميز العلاقة بين البائع والمشتري في التسويق الإلكتروني بأنها تفاعلية ومباشرة عكس التسويق التقليدي المحدود.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.m","q":"من غير الضروري في التسويق الإلكتروني الالمام الجيد بمهارات التعامل مع الانترنت بتطبيقاته المختلفة.","opts":["صح","خطأ"],"ans":1},{"cat":"dr.m","q":"العلاقة بين طرفي التبادل تكون أحادية في التسويق الإلكتروني بينما تكون تفاعلية مباشرة في التسويق التقليدي.","opts":["صح","خطأ"],"ans":1},{"cat":"dr.m","q":"التوزيع في التسويق التقليدي يعتمد على قنوات توزيع طويلة بينما في التسويق الإلكتروني يكون توزيع مباشر.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.m","q":"يعتبر التسويق الإلكتروني أقل تكلفة من طرق التسويق التقليدية وقادراً على الوصول لشرائح عملاء واسعة بسرعة.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.m","q":"يساهم التسويق الإلكتروني في تحسين الصورة الذهنية للمؤسسة وزيادة حصتها السوقية عبر الوصول لعملاء جدد.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.m","q":"تساعد بيانات السوق الدقيقة في اتخاذ القرارات المناسبة لابتكار وسائل جذب وإقناع فعالة للعملاء.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.m","q":"التكلفة في التسويق الإلكتروني أقل بكثير من التسويق التقليدي، بينما نطاق التوزيع يكون مباشراً عبر الإنترنت.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.m","q":"يحد التسويق الإلكتروني من قدرة البائع على الوصول للأسواق العالمية ويحصره في النطاق المحلي فقط.","opts":["صح","خطأ"],"ans":1},{"cat":"dr.m","q":"ضمان ولاء العاملين في فريق التسويق الإلكتروني يعد خطوة ثانوية لا تؤثر على نجاح الاستراتيجية الرقمية.","opts":["صح","خطأ"],"ans":1},{"cat":"dr.m","q":"التجارة الالكترونية هي عبارة عن كافة طرق وتعاملات البيع والشراء التي تتم الكترونيا عبر شبكة الانترنت الدولية.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.m","q":"أحد اهم فوائد التسويق الإلكتروني للمستهلك الراحة والسهولة والخصوصية والتفاعلية الفورية.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.m","q":"دراسة أسعار المنافسين ووضع سعر مناسب تعتبر من الخطوات الأساسية لإعداد الخطة الاستراتيجية التسويقية.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.m","q":"يوفر التسويق الإلكتروني إمكانية التسويق على مستوى أكثر من محافظة أو دولة في نفس الوقت وبسهولة.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.m","q":"تطوير المنتج في التسويق الإلكتروني يكون بطيء وغير كفء بينما يكون سريع وعالي الكفاءة في التسويق التقليدي.","opts":["صح","خطأ"],"ans":1},{"cat":"dr.m","q":"تعرف الاعمال الالكترونية على انها الاستخدام الأمثل للوسائط الالكترونية بما فيها الانترنت في أداء اعمال المنظمة.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.m","q":"تشمل أنشطة التسويق الإلكتروني البيع والشراء عبر الإنترنت وإدارة علاقات العملاء وخدمات ما بعد البيع.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.m","q":"لا يساعد التسويق الإلكتروني البائع في بناء علاقات قوية مع العملاء ومعرفة حجم الطلب بدقة من بيانات الزوار.","opts":["صح","خطأ"],"ans":1},{"cat":"dr.r","q":"جارى الاعداد","opts":["صح","خطأ"],"ans":1}];
        let state = { category: "all", order: "fixed", mode: "exam", view: "all", questions: [], score: 0, currentIdx: 0, mistakes: [] };

        function updateMaxHint() {
            const pool = (state.category === 'all') ? db : db.filter(q => q.cat === state.category);
            document.getElementById('max-label').textContent = "المتاح: " + pool.length;
            document.getElementById('num-input').max = pool.length;
            document.getElementById('num-input').value = pool.length;
        }

        document.querySelectorAll('.chip').forEach(btn => {
            btn.onclick = function() {
                this.parentElement.querySelector('.active').classList.remove('active');
                this.classList.add('active');
                const val = this.dataset.value;
                const pid = this.parentElement.id;
                if(pid === 'category-selector') { state.category = val; updateMaxHint(); }
                if(pid === 'order-selector') { 
                    state.order = val; 
                    document.getElementById('num-section').style.display = (val === 'random') ? 'block' : 'none';
                    updateMaxHint();
                }
                if(pid === 'mode-combined') {
                    state.mode = val.includes('exam') ? 'exam' : 'study';
                    state.view = val.includes('all') ? 'all' : 'one';
                }
            };
        });
        updateMaxHint();

        function initQuiz() {
            let pool = (state.category === 'all') ? [...db] : db.filter(q => q.cat === state.category);
            let num = (state.order === 'fixed') ? pool.length : (parseInt(document.getElementById('num-input').value) || pool.length);
            if(state.order === 'random') pool.sort(() => Math.random() - 0.5);
            state.questions = pool.slice(0, num);
            document.getElementById('setup-screen').classList.remove('active');
            document.getElementById('quiz-screen').classList.add('active');
            if(state.view === 'all') renderAll(); else showOne();
        }

        function renderAll() {
            const cont = document.getElementById('quiz-content');
            cont.innerHTML = '';
            state.questions.forEach((q, idx) => {
                const block = document.createElement('div');
                block.className = 'question-block';
                block.innerHTML = '<div class="question-text">'+(idx+1)+'. '+q.q+'</div>';
                const optsDiv = document.createElement('div');
                q.opts.forEach((opt, oIdx) => {
                    const div = document.createElement('div');
                    div.className = 'option-item'; div.textContent = opt;
                    div.onclick = () => {
                        if(optsDiv.classList.contains('locked')) return;
                        if(state.mode === 'study') {
                            optsDiv.classList.add('locked');
                            if(oIdx === q.ans) div.classList.add('correct');
                            else { div.classList.add('incorrect'); optsDiv.children[q.ans].classList.add('correct'); }
                        } else {
                            optsDiv.querySelectorAll('.option-item').forEach(s => s.classList.remove('selected-temp'));
                            div.classList.add('selected-temp');
                        }
                        q.userAns = oIdx;
                    };
                    optsDiv.appendChild(div);
                });
                block.appendChild(optsDiv);
                cont.appendChild(block);
            });
            document.getElementById('submit-btn').style.display = 'block';
        }

        function showOne() {
            const q = state.questions[state.currentIdx];
            const cont = document.getElementById('quiz-content');
            cont.innerHTML = '<div class="question-text">'+q.q+'</div><div id="opts"></div>';
            document.getElementById('q-counter').textContent = 'سؤال ' + (state.currentIdx+1) + ' من ' + state.questions.length;
            q.opts.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option-item'; div.textContent = opt;
                div.onclick = () => {
                    const optsDiv = document.getElementById('opts');
                    if(optsDiv.classList.contains('locked')) return;
                    optsDiv.classList.add('locked');
                    if(i === q.ans) { div.classList.add('correct'); state.score++; }
                    else { div.classList.add('incorrect'); optsDiv.children[q.ans].classList.add('correct'); state.mistakes.push({q:q.q, a:q.opts[q.ans]}); }
                    document.getElementById('next-btn').style.display = 'block';
                };
                document.getElementById('opts').appendChild(div);
            });
        }

        function nextQuestion() {
            state.currentIdx++;
            if(state.currentIdx < state.questions.length) { showOne(); document.getElementById('next-btn').style.display='none'; }
            else showResult();
        }

        function handleFullSubmit() {
            if(state.mode === 'exam') {
                state.score = 0; state.mistakes = [];
                state.questions.forEach(q => {
                    if(q.userAns === q.ans) state.score++;
                    else state.mistakes.push({q:q.q, a:q.opts[q.ans]});
                });
            }
            showResult();
        }

        function showResult() {
            document.getElementById('quiz-screen').classList.remove('active');
            document.getElementById('result-screen').classList.add('active');
            document.getElementById('res-msg').textContent = state.score + " / " + state.questions.length;
            const report = document.getElementById('mistakes-report');
            report.innerHTML = state.mistakes.map(m => '<div style="background:#FFF5F5; padding:10px; margin-bottom:10px; border-radius:8px; border-right:4px solid #F56565"><b>س:</b> '+m.q+'<br><span style="color:green"><b>الصح:</b> '+m.a+'</span></div>').join('');
        }
    </script>
</body>
</html>
