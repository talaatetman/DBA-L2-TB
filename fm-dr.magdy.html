<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار ذكي</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        :root { --primary-color: #5145BA; --success-color: #28a745; --error-color: #dc3545; --bg-color: #f4f4f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--primary-color); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .container { background: white; width: 100%; max-width: 570px; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); display: none; }
        .container.active { display: block; }
        h2 { color: var(--primary-color); margin-bottom: 20px; text-align: center; }
        .setting-group { margin-bottom: 20px; }
        .group-label { display: block; margin-bottom: 10px; font-weight: bold; font-size: 0.95rem; }
        .grid-options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .chip-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .chip { padding: 10px; border: 2px solid #ddd; background: white; cursor: pointer; border-radius: 8px; transition: 0.3s; text-align: center; font-weight: 500;}
        .chip.active { border-color: var(--primary-color); background: #EEF2FF; color: var(--primary-color); font-weight: 900; }
        input { width: 100%; padding: 12px; border: 2px solid #EDF2F7; border-radius: 12px; font-size: 1rem; margin-top: 5px; outline: none; }
        .max-hint { display: block; font-size: 0.8rem; color: #718096; margin-top: 5px; }
        .start-btn { width: 100%; padding: 15px; background: var(--primary-color); color: white; border: none; border-radius: 15px; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-top: 20px; }
        .question-block { margin-bottom: 25px; }
        .question-text { font-size: 1.2rem; margin-bottom: 20px; color: #444; font-weight: bold; line-height: 1.4; }
        .option-item { padding: 14px; border: 2px solid #EDF2F7; margin-bottom: 10px; border-radius: 12px; cursor: pointer; }
        .option-item.correct { background: #C6F6D5; border-color: #48BB78; color: #22543D; }
        .option-item.incorrect { background: #FED7D7; border-color: #F56565; color: #742A2A; }
        .option-item.selected-temp { border-color: var(--primary-color); background: #EBF4FF; }
        .locked { pointer-events: none; }
    </style>
</head>
<body>
    <div id="setup-screen" class="container active">
        <h2> إعداد الاختبار من اسئلة دكتور مجدى فقط</h2>
        <div class="setting-group">
            <span class="group-label">اختر القسم:</span>
            <div class="grid-options" id="category-selector">
                <button class="chip active" data-value="all">المنهج  غير كامل</button>
                <button class="chip" data-value="gen">اسئلة دكتور مجدى - تمويل</button>

            </div>
        </div>
        <div class="setting-group">
            <span class="group-label">نظام الأسئلة:</span>
            <div class="chip-grid" id="order-selector">
                <button class="chip active" data-value="fixed">ثابت (كل اسئلة القسم المختار)</button>
                <button class="chip" data-value="random">ترتيب عشوائى (ادخل عدد الاسئلة)</button>
            </div>
        </div>
        <div id="num-section" class="setting-group" style="display: none;">
            <span class="group-label">العدد:</span>
            <input type="number" id="num-input">
            <span class="max-hint" id="max-label"></span>
        </div>
        <div class="setting-group">
            <span class="group-label">النمط:</span>
            <div class="chip-grid" id="mode-combined">
                <button class="chip active" data-value="exam_all">اختبار (كل الاسئلة فى ورقة واحدة)</button>
                <button class="chip" data-value="study_one">مذاكرة (عرض سؤال بسؤال)</button>
            </div>
        </div>
        <button class="start-btn" onclick="initQuiz()">ابدأ المراجعة</button>
    </div>

    <div id="quiz-screen" class="container">
        <div id="quiz-content"></div>
        <button id="submit-btn" class="start-btn" style="display:none" onclick="handleFullSubmit()">إنهاء</button>
        <button id="next-btn" class="start-btn" style="display:none" onclick="nextQuestion()">التالي</button>
        <p id="q-counter" style="text-align:center; margin-top:10px;"></p>
    </div>

    <div id="result-screen" class="container">
        <h2 id="res-title">النتيجة</h2>
        <p id="res-msg" style="text-align:center; font-size:1.5rem;"></p>
        <div id="mistakes-report"></div>
        <button class="start-btn" onclick="location.reload()">العودة</button>
    </div>

    <script>
        const db = [{"cat":"gen","q":"السوق الأولية هي سوق التداول بينما السوق الثانوية هي سوق الإصدار.","opts":["صح","خطأ"],"ans":1},{"cat":"gen","q":"لحملة السندات الحق في الاطلاع على دفاتر وسجلات الشركة.","opts":["صح","خطأ"],"ans":1},{"cat":"gen","q":"تنقسم الأسواق المالية الى نوعين رئيسيين من الأسواق هما سوق النقد وسوق رأس المال.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"شركات السمسرة عبارة عن وسطاء مؤهلين للعمل في سوق تداول الأوراق المالية.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"بورصة الأوراق المالية هي سوق منظم يتم فيها عمليات الشراء والبيع وتكون السلعة المتداولة فيها الأوراق المالية.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"سوق الإصدار تصدر وتباع الورقة المالية لأول مرة بينما سوق التداول يتم التعامل على الورقة المالية بيعاً وشراءً بين المستثمرين.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"مؤشر 30EGX مؤشر لقياس أنشط 30 شركة من حيث حركة التداول.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"الاكتتاب العام طريقة من طرق الإصدار يخاطب فيها المصدر الجمهور العام.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"يحصل حملة الأسهم العادية على فوائد ثابتة.","opts":["صح","خطأ"],"ans":1},{"cat":"gen","q":"الاكتتاب الخاص قاصر فقط على كبار المساهمين.","opts":["صح","خطأ"],"ans":1},{"cat":"gen","q":"نشرة الاكتتاب القانونية هي أداة الإفصاح في حالة الاكتتاب العام.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"يخاطب الاكتتاب المغلق حملة الأسهم الحاليين.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"مذكرة المعلومات هي أداة الإفصاح عن الإصدار في حالة الاكتتاب الخاص.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"يتميز السهم بأن له تاريخ استحقاق محدد يلتزم المصدر فيه برد قيمته، على عكس السند الذي ليس له تاريخ استحقاق.","opts":["صح","خطأ"],"ans":1},{"cat":"gen","q":"في حالة تصفية الشركة، يحصل المساهمون على حقوقهم بالأولوية قبل سداد ديون السندات.","opts":["صح","خطأ"],"ans":1},{"cat":"gen","q":"تعتبر الأسهم صكوك ملكية لصاحبها، بينما تعتبر السندات صكوك مديونية على الشركة المصدرة.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"يشترط لإتمام عملية شراء أوراق مالية مقيدة أن يصدر للمستثمر \"كود موحد\" لدى البورصة.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"حملة السندات هم مالك الشركة وأصحاب راس المال بينما حملة الأسهم هم دائنون للشركة.","opts":["صح","خطأ"],"ans":1},{"cat":"gen","q":"يسمح نظام التداول في البورصة للمستثمرين بالتعامل المباشر فيما بينهم دون الحاجة لوسطاء لتقليل التكلفة.","opts":["صح","خطأ"],"ans":1},{"cat":"gen","q":"أحد مخالفات وجرائم أسواق الأوراق المالية هي مخالفات خاصة بعمليات التقييم المغالى فيه.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"يُعرف الاستثمار المالي بأنه التضحية بأموال مستقبلية في سبيل الحصول على تدفقات مالية حالية ومؤكدة.","opts":["صح","خطأ"],"ans":1},{"cat":"gen","q":"يسعى صغار المستثمرين أحياناً لتحقيق أقصى نمو ممكن لرأس المال كأحد أهدافهم الاستثمارية.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"دوافع الانسحاب من سوق الأوراق المالية تعنى التصفية والخروج من السوق.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"يسعى المتلاعبون بالأسعار إلى توجيه السوق صعوداً أو هبوطاً بوسائل مصطنعة للتأثير على السعر العادل.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"يتميز المضاربون الهواة بامتلاك أدوات فنية تمكنهم من التفوق على أداء السوق بصفة مستمرة.","opts":["صح","خطأ"],"ans":1},{"cat":"gen","q":"يتشابه المستثمرون الأفراد في أهدافهم الاستثمارية، ولذلك تتوحد الأسباب التي تدفعهم لدخول السوق.","opts":["صح","خطأ"],"ans":1},{"cat":"gen","q":"يعتمد التحليل الفني على تتبع حركة أسعار الأسهم في الماضي لمحاولة التنبؤ بأسعارها في المستقبل.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"تلجأ الشركات لإعادة شراء أسهمها عندما تكون مواردها المالية المتاحة أكبر من احتياجاتها الاستثمارية.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"استراتيجية \"الشراء والاحتفاظ\" هي الأنسب للمستثمرين الذين يبحثون عن تحقيق نتائج في الأجل الطويل.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"التحليل الفني للأوراق المالية يتم من خلال تتبع حركة اسعار الأسهم في الماضي للتنبؤ بأسعارها في المستقبل.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"القيمة الأسمية للسهم هي القيمة التي يصدر بها عند التأسيس، ويحدد القانون المصري حدها الأدنى بجنيه واحد.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"تؤدي عملية تجزئة الأسهم إلى زيادة إجمالي حقوق الملكية (صافي الأصول) في ميزانية الشركة المصدرة.","opts":["صح","خطأ"],"ans":1},{"cat":"gen","q":"تحليل الأوراق المالية هي الخطوة الأخيرة من خطوات عملية الاستثمار في الأوراق المالية.","opts":["صح","خطأ"],"ans":1},{"cat":"gen","q":"ربحية السهم الواحد تنخفض بعد التجزئة لأن صافي الربح يتم تقسيمه على عدد أكبر من الأسهم المصدرة.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"سيولة السهم تعني إمكانية تحويله إلى نقدية بسرعة وبسعر يقارب آخر سعر تداول وبأقل تكلفة ممكنة.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"ترفض الهيئة العامة للرقابة المالية قرارات التجزئة إذا تبين أنها تهدف فقط للمضاربة الوهمية على السهم.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"القيمة الأسمية للسهم تعبر عن الفرق بين إجمالي الأصول وإجمالي الالتزامات تجاه الدائنين.","opts":["صح","خطأ"],"ans":1},{"cat":"gen","q":"رأس المال المصدر والمدفوع يظل كما هو في حالة التجزئة ولا يتأثر بالتجزئة.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"سعر تداول السهم اليومي هو عبارة عن المدى السعري الذي تم التنفيذ به لعمليات التداول خلال الجلسة.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"يطلق على السعر النظري للسهم بعد التجزئة \"سعر الفتح\" وهو السعر المعدل بالآثار المترتبة على العملية.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"يتيح شراء الأسهم بالهامش للمستثمر شراء أوراق مالية بقيمة أعلى من الرصيد النقدي المتوفر في حسابه.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"تعتبر القروض الممنوحة للشراء بالهامش قروضاً معفاة من الفوائد من قبل شركات الوساطة.","opts":["صح","خطأ"],"ans":1},{"cat":"gen","q":"لا يحق لشركة الوساطة بيع الأسهم الموجودة في حساب الهامش دون الحصول على موافقة مسبقة من العميل لتغطية النقص.","opts":["صح","خطأ"],"ans":1},{"cat":"gen","q":"في حالة انخفاض قيمة الأسهم المشتراة بالهامش إلى ما دون مستوى معين، يحق للوسيط طلب إيداع أموال إضافية.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"يؤدي استخدام الهامش إلى مضاعفة الأرباح المحتملة، ولكنه يؤدي أيضاً إلى مضاعفة الخسائر المحتملة.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"في حالة تجزئة السهم بنسبة 1 إلى ،10 تصبح القيمة الأسمية الجديدة عشر القيمة الأسمية القديمة.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"القيمة السوقية للسهم هي دائماً متوسط أسعار الصفقات المنفذة خلال الجلسة مرجحة بالكميات.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"يشترط القانون ألا تزيد القيمة الأسمية للسهم الواحد عند التأسيس عن 500 جنيه مصري.","opts":["صح","خطأ"],"ans":1},{"cat":"gen","q":"تساهم المعلومات الاستثمارية في زيادة درجة عدم التأكد المحيطة بالقرار الاستثماري للمستثمر الفرد.","opts":["صح","خطأ"],"ans":1},{"cat":"gen","q":"تحقيق عائد جارى متوسط مع زيادة في قيمة رأس المال هو أحد اهداف الاستثمار لصغار المستثمرين.","opts":["صح","خطأ"],"ans":0}];
        let state = { category: "all", order: "fixed", mode: "exam", view: "all", questions: [], score: 0, currentIdx: 0, mistakes: [] };

        function updateMaxHint() {
            const pool = (state.category === 'all') ? db : db.filter(q => q.cat === state.category);
            document.getElementById('max-label').textContent = "المتاح: " + pool.length;
            document.getElementById('num-input').max = pool.length;
            document.getElementById('num-input').value = pool.length;
        }

        document.querySelectorAll('.chip').forEach(btn => {
            btn.onclick = function() {
                this.parentElement.querySelector('.active').classList.remove('active');
                this.classList.add('active');
                const val = this.dataset.value;
                const pid = this.parentElement.id;
                if(pid === 'category-selector') { state.category = val; updateMaxHint(); }
                if(pid === 'order-selector') { 
                    state.order = val; 
                    document.getElementById('num-section').style.display = (val === 'random') ? 'block' : 'none';
                    updateMaxHint();
                }
                if(pid === 'mode-combined') {
                    state.mode = val.includes('exam') ? 'exam' : 'study';
                    state.view = val.includes('all') ? 'all' : 'one';
                }
            };
        });
        updateMaxHint();

        function initQuiz() {
            let pool = (state.category === 'all') ? [...db] : db.filter(q => q.cat === state.category);
            let num = (state.order === 'fixed') ? pool.length : (parseInt(document.getElementById('num-input').value) || pool.length);
            if(state.order === 'random') pool.sort(() => Math.random() - 0.5);
            state.questions = pool.slice(0, num);
            document.getElementById('setup-screen').classList.remove('active');
            document.getElementById('quiz-screen').classList.add('active');
            if(state.view === 'all') renderAll(); else showOne();
        }

        function renderAll() {
            const cont = document.getElementById('quiz-content');
            cont.innerHTML = '';
            state.questions.forEach((q, idx) => {
                const block = document.createElement('div');
                block.className = 'question-block';
                block.innerHTML = '<div class="question-text">'+(idx+1)+'. '+q.q+'</div>';
                const optsDiv = document.createElement('div');
                q.opts.forEach((opt, oIdx) => {
                    const div = document.createElement('div');
                    div.className = 'option-item'; div.textContent = opt;
                    div.onclick = () => {
                        if(optsDiv.classList.contains('locked')) return;
                        if(state.mode === 'study') {
                            optsDiv.classList.add('locked');
                            if(oIdx === q.ans) div.classList.add('correct');
                            else { div.classList.add('incorrect'); optsDiv.children[q.ans].classList.add('correct'); }
                        } else {
                            optsDiv.querySelectorAll('.option-item').forEach(s => s.classList.remove('selected-temp'));
                            div.classList.add('selected-temp');
                        }
                        q.userAns = oIdx;
                    };
                    optsDiv.appendChild(div);
                });
                block.appendChild(optsDiv);
                cont.appendChild(block);
            });
            document.getElementById('submit-btn').style.display = 'block';
        }

        function showOne() {
            const q = state.questions[state.currentIdx];
            const cont = document.getElementById('quiz-content');
            cont.innerHTML = '<div class="question-text">'+q.q+'</div><div id="opts"></div>';
            document.getElementById('q-counter').textContent = 'سؤال ' + (state.currentIdx+1) + ' من ' + state.questions.length;
            q.opts.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option-item'; div.textContent = opt;
                div.onclick = () => {
                    const optsDiv = document.getElementById('opts');
                    if(optsDiv.classList.contains('locked')) return;
                    optsDiv.classList.add('locked');
                    if(i === q.ans) { div.classList.add('correct'); state.score++; }
                    else { div.classList.add('incorrect'); optsDiv.children[q.ans].classList.add('correct'); state.mistakes.push({q:q.q, a:q.opts[q.ans]}); }
                    document.getElementById('next-btn').style.display = 'block';
                };
                document.getElementById('opts').appendChild(div);
            });
        }

        function nextQuestion() {
            state.currentIdx++;
            if(state.currentIdx < state.questions.length) { showOne(); document.getElementById('next-btn').style.display='none'; }
            else showResult();
        }

        function handleFullSubmit() {
            if(state.mode === 'exam') {
                state.score = 0; state.mistakes = [];
                state.questions.forEach(q => {
                    if(q.userAns === q.ans) state.score++;
                    else state.mistakes.push({q:q.q, a:q.opts[q.ans]});
                });
            }
            showResult();
        }

        function showResult() {
            document.getElementById('quiz-screen').classList.remove('active');
            document.getElementById('result-screen').classList.add('active');
            document.getElementById('res-msg').textContent = state.score + " / " + state.questions.length;
            const report = document.getElementById('mistakes-report');
            report.innerHTML = state.mistakes.map(m => '<div style="background:#FFF5F5; padding:10px; margin-bottom:10px; border-radius:8px; border-right:4px solid #F56565"><b>س:</b> '+m.q+'<br><span style="color:green"><b>الصح:</b> '+m.a+'</span></div>').join('');
        }
    </script>
</body>
</html>
