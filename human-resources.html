<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRM-TB</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        :root { --primary-color: #5145BA; --success-color: #28a745; --error-color: #dc3545; --bg-color: #f4f4f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--primary-color); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .container { background: white; width: 100%; max-width: 570px; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); display: none; }
        .container.active { display: block; }
        h2 { color: var(--primary-color); margin-bottom: 20px; text-align: center; }
        .setting-group { margin-bottom: 20px; }
        .group-label { display: block; margin-bottom: 10px; font-weight: bold; font-size: 0.95rem; }
        .grid-options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .chip-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .chip { padding: 10px; border: 2px solid #ddd; background: white; cursor: pointer; border-radius: 8px; transition: 0.3s; text-align: center; font-weight: 500;}
        .chip.active { border-color: var(--primary-color); background: #EEF2FF; color: var(--primary-color); font-weight: 900; }
        input { width: 100%; padding: 12px; border: 2px solid #EDF2F7; border-radius: 12px; font-size: 1rem; margin-top: 5px; outline: none; }
        .max-hint { display: block; font-size: 0.8rem; color: #718096; margin-top: 5px; }
        .start-btn { width: 100%; padding: 15px; background: var(--primary-color); color: white; border: none; border-radius: 15px; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-top: 20px; }
        .question-block { margin-bottom: 25px; }
        .question-text { font-size: 1.2rem; margin-bottom: 20px; color: #444; font-weight: bold; line-height: 1.4; }
        .option-item { padding: 14px; border: 2px solid #EDF2F7; margin-bottom: 10px; border-radius: 12px; cursor: pointer; }
        .option-item.correct { background: #C6F6D5; border-color: #48BB78; color: #22543D; }
        .option-item.incorrect { background: #FED7D7; border-color: #F56565; color: #742A2A; }
        .option-item.selected-temp { border-color: var(--primary-color); background: #EBF4FF; }
        .locked { pointer-events: none; }
    </style>
</head>
<body>
    <div id="setup-screen" class="container active">
        <h2>إعداد اختبار مادة دراسات متقدمة فى ادارة الموارد البشرية</h2>
        <div class="setting-group">
            <span class="group-label">اختر القسم:</span>
            <div class="grid-options" id="category-selector">
                <button class="chip active" data-value="all">المنهج كامل</button>
                <button class="chip" data-value="dr.s">اسئلة د سيد</button>
                <button class="chip" data-value="dr.m">اسئلة د محمد</button>

            </div>
        </div>
        <div class="setting-group">
            <span class="group-label">نظام الأسئلة:</span>
            <div class="chip-grid" id="order-selector">
                <button class="chip active" data-value="fixed">ثابت (كل اسئلة القسم المختار)</button>
                <button class="chip" data-value="random">ترتيب عشوائى (ادخل عدد الاسئلة)</button>
            </div>
        </div>
        <div id="num-section" class="setting-group" style="display: none;">
            <span class="group-label">العدد:</span>
            <input type="number" id="num-input">
            <span class="max-hint" id="max-label"></span>
        </div>
        <div class="setting-group">
            <span class="group-label">النمط:</span>
            <div class="chip-grid" id="mode-combined">
                <button class="chip active" data-value="exam_all">اختبار (كل الاسئلة فى ورقة واحدة)</button>
                <button class="chip" data-value="study_one">مذاكرة (عرض سؤال بسؤال)</button>
            </div>
        </div>
        <button class="start-btn" onclick="initQuiz()">ابدأ المراجعة</button>
    </div>

    <div id="quiz-screen" class="container">
        <div id="quiz-content"></div>
        <button id="submit-btn" class="start-btn" style="display:none" onclick="handleFullSubmit()">إنهاء</button>
        <button id="next-btn" class="start-btn" style="display:none" onclick="nextQuestion()">التالي</button>
        <p id="q-counter" style="text-align:center; margin-top:10px;"></p>
    </div>

    <div id="result-screen" class="container">
        <h2 id="res-title">النتيجة</h2>
        <p id="res-msg" style="text-align:center; font-size:1.5rem;"></p>
        <div id="mistakes-report"></div>
        <button class="start-btn" onclick="location.reload()">العودة</button>
    </div>

    <script>

عاني من مقاومة حادة لعدم إدراكه حاجات المستويات الأدنى.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.s","q":"قادة الابداع هم الذين يستجيبون ويشجعون الاخرين نحو تبنى قيم الابداع، ووضع الأهداف، والطاقات، والقوى.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.s","q":"التغيير عنصر غير جوهري في عملية الابداع والابتكار التنظيمي.","opts":["صح","خطأ"],"ans":1},{"cat":"dr.s","q":"فجوة الأداء هي الفرق بين الأداء المخطط أو المرغوب فيه وبين الأداء الفعلي.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.s","q":"الناس متساوون في مقدار الوقت الذي يملكونه لكنهم يختلفون في كيفية استثماره.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.s","q":"الوقت مورد استراتيجي يمكن تخزينه واسترجاعه عند الحاجة.","opts":["صح","خطأ"],"ans":1},{"cat":"dr.s","q":"الهدف من إدارة الوقت هو استغلال الحاضر والاستعداد للمستقبل لتقليل الأزمات.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.s","q":"تنص قاعدة \"باريتو\" على أن 20% من النتائج يتحقق بإنجاز 80% من الأهداف أو المهام.","opts":["صح","خطأ"],"ans":1},{"cat":"dr.s","q":"يمكن استخدام إدارة الوقت بكفاءة للتمييز بين الإدارة او القيادة الفعالة وغير الفعالة.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.s","q":"غياب العدالة التنظيمية يؤدي إلى زيادة الصراعات وإهدار الوقت الإداري.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.s","q":"يضيع المدير في المتوسط 3.75 ساعة يومياً في أنشطة غير منتجة وفق بعض الدراسات.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.s","q":"تأنيب الدقيقة الواحدة يجب أن يركز على شخص الموظف وليس على أدائه المهني.","opts":["صح","خطأ"],"ans":1},{"cat":"dr.s","q":"أتمتة المستندات والمعلومات تساهم في تقليل الوقت الضائع في البحث عن البيانات.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.s","q":"الرقابة على الوقت تشمل تحديد معايير زمنية للمهام وقياس الإنجاز الفعلي.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.s","q":"\"الإدارة بالاستثناء \"تعني تركيز المدير على كافة التفاصيل الروتينية اليومية.","opts":["صح","خطأ"],"ans":1},{"cat":"dr.s","q":"المدخل البيئي لإدارة الوقت لا علاقة له بتشريعات الدولة أو كفاءة المواصلات.","opts":["صح","خطأ"],"ans":1},{"cat":"dr.s","q":"الرقابة الذاتية هي أحد أهم ثمار المنهج الإسلامي في إدارة الوقت.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.s","q":"يعتبر الوقت أحد الموارد الاقتصادية غير الفاعلة في عمليات التنمية سواء على مستوى المجتمع او المنظمة او الفرد.","opts":["صح","خطأ"],"ans":1},{"cat":"dr.s","q":"الوقت كأصل استراتيجي يساهم في صنع ميزة تنافسية مستدامة للمنظمة.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.s","q":"تفويض الأعمال الروتينية للمساعدين يعطل المدير عن أداء مهامه الاستراتيجية.","opts":["صح","خطأ"],"ans":1},{"cat":"dr.s","q":"تعود الأسباب الشخصية والنفسية لهدر الوقت الى اللامبالاة وضعف القيم والفشل والنظرة التشاؤمية.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.s","q":"يلعب الوقت دورا غير هاما في النجاح والفشل على مستوى الافراد والمنظمات والمجتمع ككل.","opts":["صح","خطأ"],"ans":1},{"cat":"dr.s","q":"التخطيط الزمني الفعال يتطلب قوائم بالأنشطة تشمل المدى القصير والطويل الأجل.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.s","q":"إدارة الوقت قضية استراتيجية ترسم مخرجات الأفراد والمنظمات وليست مجرد مهارة فردية.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.s","q":"الأخلاقيات التنظيمية هي مجموعة القيم والمعايير التي تحكم سلوك الأفراد داخل المنظمة.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.s","q":"يقتصر تأثير الأخلاقيات على العلاقات الداخلية بين الموظفين ولا يمتد للعملاء.","opts":["صح","خطأ"],"ans":1},{"cat":"dr.s","q":"دعم الإدارة العليا هو العنصر الأكثر تأثيراً في بناء الأخلاق التنظيمية.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.s","q":"تسمى الالتزامات الواضحة كالحضور والانصراف بالأنماط الأخلاقية الصريحة.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.s","q":"الالتزام بأخلاق العمل يقلل من ثقة أصحاب المصلحة في المنظمة.","opts":["صح","خطأ"],"ans":1},{"cat":"dr.s","q":"يعتبر كود الاخلاقيات من الاشكال او الأنماط الشائعة لغرس القيم في المنظمات.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.s","q":"يتميز قائد التحول بقدرته على إلهام العاملين وتعزيز القيم الإنسانية.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.s","q":"يستخدم القادة أنظمة المكافآت كآلية لبناء الثقافة الأخلاقية.","opts":["صح","خطأ"],"ans":0},{"cat":"dr.s","q":"الثقافة التنظيمية لا تلعب أي دور في تعزي         let state = { category: "all", order: "fixed", mode: "exam", view: "all", questions: [], score: 0, currentIdx: 0, mistakes: [] };

        function updateMaxHint() {
            const pool = (state.category === 'all') ? db : db.filter(q => q.cat === state.category);
            document.getElementById('max-label').textContent = "المتاح: " + pool.length;
            document.getElementById('num-input').max = pool.length;
            document.getElementById('num-input').value = pool.length;
        }

        document.querySelectorAll('.chip').forEach(btn => {
            btn.onclick = function() {
                this.parentElement.querySelector('.active').classList.remove('active');
                this.classList.add('active');
                const val = this.dataset.value;
                const pid = this.parentElement.id;
                if(pid === 'category-selector') { state.category = val; updateMaxHint(); }
                if(pid === 'order-selector') { 
                    state.order = val; 
                    document.getElementById('num-section').style.display = (val === 'random') ? 'block' : 'none';
                    updateMaxHint();
                }
                if(pid === 'mode-combined') {
                    state.mode = val.includes('exam') ? 'exam' : 'study';
                    state.view = val.includes('all') ? 'all' : 'one';
                }
            };
        });
        updateMaxHint();

        function initQuiz() {
            let pool = (state.category === 'all') ? [...db] : db.filter(q => q.cat === state.category);
            let num = (state.order === 'fixed') ? pool.length : (parseInt(document.getElementById('num-input').value) || pool.length);
            if(state.order === 'random') pool.sort(() => Math.random() - 0.5);
            state.questions = pool.slice(0, num);
            document.getElementById('setup-screen').classList.remove('active');
            document.getElementById('quiz-screen').classList.add('active');
            if(state.view === 'all') renderAll(); else showOne();
        }

        function renderAll() {
            const cont = document.getElementById('quiz-content');
            cont.innerHTML = '';
            state.questions.forEach((q, idx) => {
                const block = document.createElement('div');
                block.className = 'question-block';
                block.innerHTML = '<div class="question-text">'+(idx+1)+'. '+q.q+'</div>';
                const optsDiv = document.createElement('div');
                q.opts.forEach((opt, oIdx) => {
                    const div = document.createElement('div');
                    div.className = 'option-item'; div.textContent = opt;
                    div.onclick = () => {
                        if(optsDiv.classList.contains('locked')) return;
                        if(state.mode === 'study') {
                            optsDiv.classList.add('locked');
                            if(oIdx === q.ans) div.classList.add('correct');
                            else { div.classList.add('incorrect'); optsDiv.children[q.ans].classList.add('correct'); }
                        } else {
                            optsDiv.querySelectorAll('.option-item').forEach(s => s.classList.remove('selected-temp'));
                            div.classList.add('selected-temp');
                        }
                        q.userAns = oIdx;
                    };
                    optsDiv.appendChild(div);
                });
                block.appendChild(optsDiv);
                cont.appendChild(block);
            });
            document.getElementById('submit-btn').style.display = 'block';
        }

        function showOne() {
            const q = state.questions[state.currentIdx];
            const cont = document.getElementById('quiz-content');
            cont.innerHTML = '<div class="question-text">'+q.q+'</div><div id="opts"></div>';
            document.getElementById('q-counter').textContent = 'سؤال ' + (state.currentIdx+1) + ' من ' + state.questions.length;
            q.opts.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option-item'; div.textContent = opt;
                div.onclick = () => {
                    const optsDiv = document.getElementById('opts');
                    if(optsDiv.classList.contains('locked')) return;
                    optsDiv.classList.add('locked');
                    if(i === q.ans) { div.classList.add('correct'); state.score++; }
                    else { div.classList.add('incorrect'); optsDiv.children[q.ans].classList.add('correct'); state.mistakes.push({q:q.q, a:q.opts[q.ans]}); }
                    document.getElementById('next-btn').style.display = 'block';
                };
                document.getElementById('opts').appendChild(div);
            });
        }

        function nextQuestion() {
            state.currentIdx++;
            if(state.currentIdx < state.questions.length) { showOne(); document.getElementById('next-btn').style.display='none'; }
            else showResult();
        }

        function handleFullSubmit() {
            if(state.mode === 'exam') {
                state.score = 0; state.mistakes = [];
                state.questions.forEach(q => {
                    if(q.userAns === q.ans) state.score++;
                    else state.mistakes.push({q:q.q, a:q.opts[q.ans]});
                });
            }
            showResult();
        }

        function showResult() {
            document.getElementById('quiz-screen').classList.remove('active');
            document.getElementById('result-screen').classList.add('active');
            document.getElementById('res-msg').textContent = state.score + " / " + state.questions.length;
            const report = document.getElementById('mistakes-report');
            report.innerHTML = state.mistakes.map(m => '<div style="background:#FFF5F5; padding:10px; margin-bottom:10px; border-radius:8px; border-right:4px solid #F56565"><b>س:</b> '+m.q+'<br><span style="color:green"><b>الصح:</b> '+m.a+'</span></div>').join('');
        }
    </script>
