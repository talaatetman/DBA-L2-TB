<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار ذكي</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        :root { --primary-color: #5145BA; --success-color: #28a745; --error-color: #dc3545; --bg-color: #f4f4f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--primary-color); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .container { background: white; width: 100%; max-width: 570px; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); display: none; }
        .container.active { display: block; }
        h2 { color: var(--primary-color); margin-bottom: 20px; text-align: center; }
        .setting-group { margin-bottom: 20px; }
        .group-label { display: block; margin-bottom: 10px; font-weight: bold; font-size: 0.95rem; }
        .grid-options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .chip-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .chip { padding: 10px; border: 2px solid #ddd; background: white; cursor: pointer; border-radius: 8px; transition: 0.3s; text-align: center; font-weight: 500;}
        .chip.active { border-color: var(--primary-color); background: #EEF2FF; color: var(--primary-color); font-weight: 900; }
        input { width: 100%; padding: 12px; border: 2px solid #EDF2F7; border-radius: 12px; font-size: 1rem; margin-top: 5px; outline: none; }
        .max-hint { display: block; font-size: 0.8rem; color: #718096; margin-top: 5px; }
        .start-btn { width: 100%; padding: 15px; background: var(--primary-color); color: white; border: none; border-radius: 15px; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-top: 20px; }
        .question-block { margin-bottom: 25px; }
        .question-text { font-size: 1.2rem; margin-bottom: 20px; color: #444; font-weight: bold; line-height: 1.4; }
        .option-item { padding: 14px; border: 2px solid #EDF2F7; margin-bottom: 10px; border-radius: 12px; cursor: pointer; }
        .option-item.correct { background: #C6F6D5; border-color: #48BB78; color: #22543D; }
        .option-item.incorrect { background: #FED7D7; border-color: #F56565; color: #742A2A; }
        .option-item.selected-temp { border-color: var(--primary-color); background: #EBF4FF; }
        .locked { pointer-events: none; }
    </style>
</head>
<body>
    <div id="setup-screen" class="container active">
        <h2> إعداد الاختبار من اسئلة دكتور انجى فقط</h2>
        <div class="setting-group">
            <span class="group-label">اختر القسم:</span>
            <div class="grid-options" id="category-selector">
                <button class="chip active" data-value="all">المنهج غير كامل</button>
                <button class="chip" data-value="gen">اسئلة دكتور انجى - بحث علمى</button>

            </div>
        </div>
        <div class="setting-group">
            <span class="group-label">نظام الأسئلة:</span>
            <div class="chip-grid" id="order-selector">
                <button class="chip active" data-value="fixed">ثابت (كل اسئلة القسم المختار)</button>
                <button class="chip" data-value="random">ترتيب عشوائى (ادخل عدد الاسئلة)</button>
            </div>
        </div>
        <div id="num-section" class="setting-group" style="display: none;">
            <span class="group-label">العدد:</span>
            <input type="number" id="num-input">
            <span class="max-hint" id="max-label"></span>
        </div>
        <div class="setting-group">
            <span class="group-label">النمط:</span>
            <div class="chip-grid" id="mode-combined">
                <button class="chip active" data-value="exam_all">اختبار (كل الاسئلة فى ورقة واحدة)</button>
                <button class="chip" data-value="study_one">مذاكرة (عرض سؤال بسؤال)</button>
            </div>
        </div>
        <button class="start-btn" onclick="initQuiz()">ابدأ المراجعة</button>
    </div>

    <div id="quiz-screen" class="container">
        <div id="quiz-content"></div>
        <button id="submit-btn" class="start-btn" style="display:none" onclick="handleFullSubmit()">إنهاء</button>
        <button id="next-btn" class="start-btn" style="display:none" onclick="nextQuestion()">التالي</button>
        <p id="q-counter" style="text-align:center; margin-top:10px;"></p>
    </div>

    <div id="result-screen" class="container">
        <h2 id="res-title">النتيجة</h2>
        <p id="res-msg" style="text-align:center; font-size:1.5rem;"></p>
        <div id="mistakes-report"></div>
        <button class="start-btn" onclick="location.reload()">العودة</button>
    </div>

    <script>
        const db = [{"cat":"gen","q":"العلم جهد انساني منظم ومن سماته انه تراكمي البناء.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"البحث العلمي هو محاولة دقيقة وناقضة لحل مشكلات تؤرق البشرية وتحيرها.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"يشير مصطلح العلم الى معرفة العلاقات المتداخلة والمنسقة بين الظواهر.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"تعد المعرفة جزء من العلم حيث إن المعرفة أوسع واشمل.","opts":["صح","خطأ"],"ans":1},{"cat":"gen","q":"يجب الاهتمام بالكم وليس بالكيف عند اعداد الإطار النظري.","opts":["صح","خطأ"],"ans":1},{"cat":"gen","q":"من مقومات البحث العلمي السليم الموضوعية والأمانة العلمية للباحث.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"من شروط البحث العلمي تجنب المواضيع التي طرحت من قبل، وان يرتبط بشكل مباشر بحاجات الناس.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"يجب على الباحث تحرى خطوات البحث العلمي بشكل موضعي وغير متحيز وفقا لتوجهاته الشخصية.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"لا يشترط ان يعد البحث العلمي بطريقة متسلسلة، ولا يجب اتباع نمط علمي ممنهج.","opts":["صح","خطأ"],"ans":1},{"cat":"gen","q":"الانفتاح الفكري يتطلب من الباحث أن يكون ذا عقلية متفتحة على كل الأفكار والأخرى التي تعارضه، حتى لو لم تعجبه.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"البحث العلمي تفسير حقيقة ما بعبارات منطقية وواقعية من خلال تطبيق قوانين خاصة متوفرة بالطبيعة والمجتمع.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"من انواع البحوث العلمية الرسائل الجامعية وبحث الماجستير وبحث الدكتوراه.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"التوثيق المضلل يؤثر على سلامة البحث العلمي ولا يخل بالأمانة العلمية.","opts":["صح","خطأ"],"ans":1},{"cat":"gen","q":"الفضول العلمي يدفع الباحث الى الاستزادة من القراءة والاطلاع.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"التمتع بسرعة البديهة وقوة الملاحظة والغرور من صفات الباحث الجيد.","opts":["صح","خطأ"],"ans":1},{"cat":"gen","q":"عند وضع عنوان البحث يتم ذكر المتغيرات التابعة اولا وتأتى بعدها المتغيرات المستقلة.","opts":["صح","خطأ"],"ans":1},{"cat":"gen","q":"التوثيق المضلل يؤثر على سلامة البحث العلمي ويخل بالأمانة العلمية.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"يقصد بالصدق هو مدى قياس الاختبار ما وضع لقياسه.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"يمكن للباحث في قائمة المراجع استخدام مراجع قديمة في وضع خطة البحث تزيد عن عشرة سنوات.","opts":["صح","خطأ"],"ans":1},{"cat":"gen","q":"الفرق بين البحوث التطبيقية والاساسية في اللغة العربية في أن الأخيرة تعنى نقب وفتش.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"القابلية للاختبار يقصد بها أن تكون الظاهرة قابلة للاختبار والقياس.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"تعد كل المعارف على مستوى واحد.","opts":["صح","خطأ"],"ans":1},{"cat":"gen","q":"لا يشترط ان تكون الدراسات السابقة التي يستعين بها الباحث في الاستدلال او الاقتباس اصلية.","opts":["صح","خطأ"],"ans":1},{"cat":"gen","q":"يستخدم المنهج الوصفي في المجالات ذات الطبيعة الاجتماعية على وجه الخصوص.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"لا تساعد الدراسات السابقة الباحث على اعداد مقارنات بين نتائجه ونتائج الدراسات السابقة.","opts":["صح","خطأ"],"ans":1},{"cat":"gen","q":"مجتمع البحث هو مجموعة من الافراد الذين يتناولهم الباحث بالدراسة.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"تساهم الدراسات السابقة في إضفاء لمسة الابداع على الدراسة التي يقوم بها الباحث.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"الاقتباس من الأبحاث السابقة يجب أن يكون هادفاً ومرتبطاً بموضوع البحث.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"المنهج الوصفي يكتفي بوصف الظاهرة دون تحليل متغيراتها التابعة والمستقلة.","opts":["صح","خطأ"],"ans":1},{"cat":"gen","q":"يجب تعريف مصطلحات البحث العلمي لتجنب اساءة الفهم لبعض المصطلحات.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"يمكن صياغة مشكلة الدراسة من خلال عرض ودراسة الدراسات السابقة.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"من الاخطاء التي يقع فيها الباحثون تناول تعريفات كثيرة دون تحديد للمعنى المطلوب في البحث.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"اللياقة البدنية للباحث وخلوه من الامراض والقدرة على تحمل المعوقات من الصفات الجسمية للباحث.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"الدراسات الاستطلاعية واحده من الدراسات الاجتماعية، \"الوصفية، التشخيصية، الاستطلاعية.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"ليس من الضروري ان تكون مشكلة البحث واقعية وقائمة على أساس علمي ومعلوماتي سليم.","opts":["صح","خطأ"],"ans":1},{"cat":"gen","q":"المنهج الاستقرائي يعتبر من أساليب البحث العلمي الخطية التي تعتمد على العقل.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"البحوث الاستكشافية تهدف لوضع حجر الأساس للدراسات المستقبلية.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"يقصد بالبيانات الثانوية هي التي يقوم الباحث بتجميعها خصيصا لأغراض البحث.","opts":["صح","خطأ"],"ans":1},{"cat":"gen","q":"يجب ان تكون مشكلة البحث قابلة للبحث العلمي وليست مجرد مسلمات او بديهيات.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"يجب ان تتمثل مشكلة البحث اضافة علمية وان تكون واقعية وقائمة على اساس علمي ومعلوماتي.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"المنهج هو جملة الاجراءات والاساليب التي يستخدمها الباحث في جمع البيانات وتصنيفها وتحليلها.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"تسهم الدراسات السابقة على صياغة اهداف البحث وطبيعة دراسته والصياغة الدقيقة الواضحة.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"الدراسة الاستطلاعية لا تضع فرضيات، ولكنها تقوم بوضع عدد من التساؤلات وتبدأ في البحث لإيجاد اجابتها.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"الدراسات الاستطلاعية تستخدم البيانات الأولية والثانوية مع اً.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"يعاب على الاستبيان المغلق انه يجبر المستجيب على اختيار إجابة قد لا تنطبق علية.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"من أشهر طرق الحصول على البيانات الثانوية هي الاستقصاء، والملاحظة والاستبيان والاختبار.","opts":["صح","خطأ"],"ans":1},{"cat":"gen","q":"من العناصر التي لا يجب ان تتضمنها الدراسات السابقة اسم الباحث وسنة التأليف وعنوان الدراسة السابقة.","opts":["صح","خطأ"],"ans":1},{"cat":"gen","q":"يعتبر التحليل الإحصائي من اهم الطرق لتحليل كافة البيانات التي نحصل عليها من خلال أدوات البحث العلمي.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"يقصد بالبيانات الثانوية تلك البيانات التي يقوم الباحث بتجميعها بنفسه او عن طريق اخرين خصيصا لأغراض البحث.","opts":["صح","خطأ"],"ans":1},{"cat":"gen","q":"من خلال المصادر والمراجع نستطيع التعرف على مدى التطور الذي وصلت اليه البشرية في جميع المجالات.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"السؤال المفتوح يتميز بسهولة الترميز والجدولة الإحصائية.","opts":["صح","خطأ"],"ans":1},{"cat":"gen","q":"العينة العشوائية البسيطة تعطي لكل مفردة في المجتمع نفس فرصة الاختيار.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"إطار البحث هو كشف بأسماء وعناوين تليفونات جميع مفردات مجتمع البحث.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"العينة التحكمية يطلق عليها العينة العمدية أو الفرضية.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"الاستقصاء يعتبر أداة مناسبة لجمع البيانات الأولية من الميدان.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"أسئلة السلم في قوائم الاستقصاء تعتبر دائماً أسئلة مغلقة.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"البحوث الوثائقية تعتمد بشكل أساسي على المنهج التاريخي.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"تعد الخصائص الديموغرافية من الأنواع الهامة للبيانات الثانوية.","opts":["صح","خطأ"],"ans":1},{"cat":"gen","q":"تفضل المقابلات الشخصية في الدراسة الميدانية.","opts":["صح","خطأ"],"ans":0},{"cat":"gen","q":"العينة المنتظمة يمكن استخدامها لسؤال المترددين على مكان محدد (مثل هايبر وان).","opts":["صح","خطأ"],"ans":0}];
        let state = { category: "all", order: "fixed", mode: "exam", view: "all", questions: [], score: 0, currentIdx: 0, mistakes: [] };

        function updateMaxHint() {
            const pool = (state.category === 'all') ? db : db.filter(q => q.cat === state.category);
            document.getElementById('max-label').textContent = "المتاح: " + pool.length;
            document.getElementById('num-input').max = pool.length;
            document.getElementById('num-input').value = pool.length;
        }

        document.querySelectorAll('.chip').forEach(btn => {
            btn.onclick = function() {
                this.parentElement.querySelector('.active').classList.remove('active');
                this.classList.add('active');
                const val = this.dataset.value;
                const pid = this.parentElement.id;
                if(pid === 'category-selector') { state.category = val; updateMaxHint(); }
                if(pid === 'order-selector') { 
                    state.order = val; 
                    document.getElementById('num-section').style.display = (val === 'random') ? 'block' : 'none';
                    updateMaxHint();
                }
                if(pid === 'mode-combined') {
                    state.mode = val.includes('exam') ? 'exam' : 'study';
                    state.view = val.includes('all') ? 'all' : 'one';
                }
            };
        });
        updateMaxHint();

        function initQuiz() {
            let pool = (state.category === 'all') ? [...db] : db.filter(q => q.cat === state.category);
            let num = (state.order === 'fixed') ? pool.length : (parseInt(document.getElementById('num-input').value) || pool.length);
            if(state.order === 'random') pool.sort(() => Math.random() - 0.5);
            state.questions = pool.slice(0, num);
            document.getElementById('setup-screen').classList.remove('active');
            document.getElementById('quiz-screen').classList.add('active');
            if(state.view === 'all') renderAll(); else showOne();
        }

        function renderAll() {
            const cont = document.getElementById('quiz-content');
            cont.innerHTML = '';
            state.questions.forEach((q, idx) => {
                const block = document.createElement('div');
                block.className = 'question-block';
                block.innerHTML = '<div class="question-text">'+(idx+1)+'. '+q.q+'</div>';
                const optsDiv = document.createElement('div');
                q.opts.forEach((opt, oIdx) => {
                    const div = document.createElement('div');
                    div.className = 'option-item'; div.textContent = opt;
                    div.onclick = () => {
                        if(optsDiv.classList.contains('locked')) return;
                        if(state.mode === 'study') {
                            optsDiv.classList.add('locked');
                            if(oIdx === q.ans) div.classList.add('correct');
                            else { div.classList.add('incorrect'); optsDiv.children[q.ans].classList.add('correct'); }
                        } else {
                            optsDiv.querySelectorAll('.option-item').forEach(s => s.classList.remove('selected-temp'));
                            div.classList.add('selected-temp');
                        }
                        q.userAns = oIdx;
                    };
                    optsDiv.appendChild(div);
                });
                block.appendChild(optsDiv);
                cont.appendChild(block);
            });
            document.getElementById('submit-btn').style.display = 'block';
        }

        function showOne() {
            const q = state.questions[state.currentIdx];
            const cont = document.getElementById('quiz-content');
            cont.innerHTML = '<div class="question-text">'+q.q+'</div><div id="opts"></div>';
            document.getElementById('q-counter').textContent = 'سؤال ' + (state.currentIdx+1) + ' من ' + state.questions.length;
            q.opts.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option-item'; div.textContent = opt;
                div.onclick = () => {
                    const optsDiv = document.getElementById('opts');
                    if(optsDiv.classList.contains('locked')) return;
                    optsDiv.classList.add('locked');
                    if(i === q.ans) { div.classList.add('correct'); state.score++; }
                    else { div.classList.add('incorrect'); optsDiv.children[q.ans].classList.add('correct'); state.mistakes.push({q:q.q, a:q.opts[q.ans]}); }
                    document.getElementById('next-btn').style.display = 'block';
                };
                document.getElementById('opts').appendChild(div);
            });
        }

        function nextQuestion() {
            state.currentIdx++;
            if(state.currentIdx < state.questions.length) { showOne(); document.getElementById('next-btn').style.display='none'; }
            else showResult();
        }

        function handleFullSubmit() {
            if(state.mode === 'exam') {
                state.score = 0; state.mistakes = [];
                state.questions.forEach(q => {
                    if(q.userAns === q.ans) state.score++;
                    else state.mistakes.push({q:q.q, a:q.opts[q.ans]});
                });
            }
            showResult();
        }

        function showResult() {
            document.getElementById('quiz-screen').classList.remove('active');
            document.getElementById('result-screen').classList.add('active');
            document.getElementById('res-msg').textContent = state.score + " / " + state.questions.length;
            const report = document.getElementById('mistakes-report');
            report.innerHTML = state.mistakes.map(m => '<div style="background:#FFF5F5; padding:10px; margin-bottom:10px; border-radius:8px; border-right:4px solid #F56565"><b>س:</b> '+m.q+'<br><span style="color:green"><b>الصح:</b> '+m.a+'</span></div>').join('');
        }
    </script>
</body>
</html>
